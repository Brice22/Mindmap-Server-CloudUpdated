# ============================================================
# NGINX CONFIGURATION FOR HSERVER
# ============================================================
# This file routes all incoming traffic to the correct container.
# Think of nginx as a "Traffic Cop" - it looks at the URL and 
# decides which Docker container should handle the request.
# ============================================================

# --- PERFORMANCE TUNING ---
# worker_processes: How many CPU cores nginx can use
# auto = use all available cores
worker_processes auto;

# --- ERROR LOGGING ---
# Where nginx writes error messages (check this when debugging)
error_log /var/log/nginx/error.log warn;

events {
    # worker_connections: Max simultaneous connections per worker
    # 1024 is good for a personal server
    worker_connections 1024;
}

http {
    # --- BASIC SETTINGS ---
    include       /etc/nginx/mime.types;  # Tells browsers what file types are
    default_type  application/octet-stream;
    
    # --- LOGGING FORMAT ---
    # This creates readable logs like: "192.168.1.1 - GET /api/mindmap 200"
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    # --- PERFORMANCE ---
    sendfile on;           # Faster file serving
    keepalive_timeout 65;  # Keep connections open for 65 seconds
    client_max_body_size 100M;  # Allow uploads up to 100MB

    # --- GZIP COMPRESSION ---
    # Makes responses smaller = faster page loads
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;

    # ========================================================
    # UPSTREAM BLOCKS
    # ========================================================
    # These define WHERE each service lives (container:port)
    # nginx uses these names in the proxy_pass directives below
    # ========================================================

    upstream frontend {
        server frontend_app:3000;  # Next.js runs on port 3000 inside container
    }

    upstream backend {
        server backend_nest:3000;  # NestJS runs on port 3000 inside container
    }

    upstream etherpad {
        server etherpad:9001;  # Etherpad runs on port 9001
    }

    upstream keycloak {
        server keycloak:8080;  # Keycloak runs on port 8080
    }

    upstream grafana {
        server grafana:3000;  # Grafana runs on port 3000
    }

    upstream prometheus {
        server prometheus:9090;  # Prometheus runs on port 9090
    }

    upstream jenkins {
        server jenkins:8080;  # Jenkins runs on port 8080
    }

    upstream vaultwarden {
        server vaultwarden:80;  # Vaultwarden runs on port 80
    }

    upstream neo4j {
        server neo4j:7474;  # Neo4j Browser runs on port 7474
    }

    upstream meilisearch {
        server meilisearch:7700;  # MeiliSearch runs on port 7700
    }

    upstream mindsdb {
        server mindsdb:47334;  # MindsDB runs on port 47334
    }

    # ========================================================
    # MAIN SERVER BLOCK (HTTPS on port 443)
    # ========================================================
    server {
        listen 443 ssl http2;
        server_name 10.10.0.1;  # Your server IP

        # --- SSL CERTIFICATES ---
        # These encrypt all traffic (the padlock in your browser)
        ssl_certificate     /etc/nginx/certs/self.crt;
        ssl_certificate_key /etc/nginx/certs/self.key;
        
        # --- SSL SECURITY SETTINGS ---
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers off;

        # ====================================================
        # ROUTE: / (Root) → Frontend (Next.js)
        # ====================================================
        # When someone visits https://10.10.0.1/ they see your mindmap UI
        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        location /metrics/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # ====================================================
        # ROUTE: /api/* → Backend (NestJS)
        # ====================================================
        # API calls like /api/mindmap go to your NestJS backend
        location /api/ {
            # Rewrite removes /api prefix: /api/mindmap → /mindmap
            rewrite ^/api/(.*) /$1 break;
            
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ====================================================
        # ROUTE: /mindmap-socket/* → Backend WebSocket
        # ====================================================
        # Real-time node dragging uses WebSockets, not HTTP
        # WebSockets need special "Upgrade" headers
        location /mindmap-socket/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            
            # These headers upgrade HTTP → WebSocket connection
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # WebSockets can be long-lived, increase timeouts
            proxy_read_timeout 86400;
            proxy_send_timeout 86400;
        }

        # ====================================================
        # ROUTE: /etherpad/* → Etherpad (Collaborative Notes)
        # ====================================================
        location /etherpad/ {
            # Rewrite removes /etherpad prefix
            rewrite ^/etherpad/(.*) /$1 break;
            
            proxy_pass http://etherpad;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;  # Real-time requires no buffering
        }

        # ====================================================
        # ROUTE: /auth/* → Keycloak (Login/SSO)
        # ====================================================
        location /auth/ {
            proxy_pass http://keycloak;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Keycloak needs these extra headers
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port 443;
            proxy_buffer_size 128k;
            proxy_buffers 4 256k;
        }

        # ====================================================
        # ROUTE: /grafana/* → Grafana (Dashboards)
        # ====================================================
        location /grafana/ {
            rewrite ^/grafana/(.*) /$1 break;
            proxy_pass http://grafana;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ====================================================
        # ROUTE: /prometheus/* → Prometheus (Metrics)
        # ====================================================
        location /prometheus/ {
            proxy_pass http://prometheus;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ====================================================
        # ROUTE: /jenkins/* → Jenkins (CI/CD)
        # ====================================================
        location /jenkins/ {
            proxy_pass http://jenkins;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Jenkins needs large headers for some operations
            proxy_buffer_size 128k;
            proxy_buffers 4 256k;
        }

        # ====================================================
        # ROUTE: /vault/* → Vaultwarden (Password Manager)
        # ====================================================
        location /vault/ {
            rewrite ^/vault/(.*) /$1 break;
            proxy_pass http://vaultwarden;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ====================================================
        # ROUTE: /neo4j/* → Neo4j Browser
        # ====================================================
        location /neo4j/ {
            rewrite ^/neo4j/(.*) /$1 break;
            proxy_pass http://neo4j;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ====================================================
        # ROUTE: /search/* → MeiliSearch
        # ====================================================
        location /search/ {
            rewrite ^/search/(.*) /$1 break;
            proxy_pass http://meilisearch;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ====================================================
        # ROUTE: /mindsdb/* → MindsDB (AI)
        # ====================================================
        location /mindsdb/ {
            rewrite ^/mindsdb/(.*) /$1 break;
            proxy_pass http://mindsdb;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ====================================================
        # STATIC FILES (Uploaded Images, etc.)
        # ====================================================
        location /uploads/ {
            alias /srv/hserverdir-data/cloud_data/;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    # ========================================================
    # HTTP → HTTPS REDIRECT
    # ========================================================
    # If someone visits http://... redirect them to https://...
    server {
        listen 80;
        server_name 10.10.0.1;
        return 301 https://$host$request_uri;
    }
}
